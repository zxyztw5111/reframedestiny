<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reframe Destiny</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: #e8e4f3;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 45%, #24243e 100%);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 40%, rgba(120, 80, 255, 0.25), transparent),
        radial-gradient(ellipse 60% 40% at 80% 60%, rgba(60, 140, 255, 0.2), transparent);
      pointer-events: none;
      z-index: 0;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    .hero {
      text-align: center;
      max-width: 640px;
    }

    .badge {
      display: inline-block;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #b8a9ff;
      border: 1px solid rgba(184, 169, 255, 0.35);
      border-radius: 999px;
      padding: 0.35rem 1rem;
      margin-bottom: 1.5rem;
      background: rgba(120, 80, 255, 0.1);
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 3.75rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(120deg, #ffffff 0%, #c4b5fd 50%, #93c5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.25rem;
      line-height: 1.15;
    }

    .tagline {
      font-size: 1.125rem;
      line-height: 1.75;
      color: rgba(232, 228, 243, 0.85);
      margin-bottom: 2.5rem;
    }

    .btn {
      display: inline-block;
      padding: 0.875rem 2.25rem;
      font-size: 1rem;
      font-weight: 500;
      color: #ffffff;
      text-decoration: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 50%, #2563eb 100%);
      box-shadow: 0 4px 24px rgba(124, 58, 237, 0.4);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(124, 58, 237, 0.55);
    }

    .btn:active {
      transform: translateY(0);
    }

    #about {
      max-width: 560px;
      margin: 0 auto;
      padding: 3rem 2rem 4rem;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    #about h2 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #c4b5fd;
      margin-bottom: 1.5rem;
    }

    #about ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      text-align: left;
    }

    #about li {
      padding: 1rem 1.25rem;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(184, 169, 255, 0.15);
      font-size: 0.9375rem;
      line-height: 1.6;
      color: rgba(232, 228, 243, 0.8);
    }

    #about li strong {
      color: #e8e4f3;
      display: block;
      margin-bottom: 0.25rem;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.8125rem;
      color: rgba(232, 228, 243, 0.45);
      position: relative;
      z-index: 1;
    }

    html {
      scroll-behavior: smooth;
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <span class="badge">AI · 命理 · 重构叙事</span>
      <h1>Reframe Destiny</h1>
      <p class="tagline">
        一款面向年轻女性的 AI 驱动命理互动体验。输入八字后，你将同时获得传统解读与重新解读——用 AI 识别并重构传统文化叙事中的性别偏见，让命运的故事由你自己书写。
      </p>
      <a
        href="https://github.com/zxyztw5111/reframedestiny"
        class="btn"
        target="_blank"
        rel="noopener noreferrer"
      >了解更多</a>
    </section>
  </main>

  <section id="about">
    <h2>关于本项目</h2>
    <ul>
      <li>
        <strong>核心理念</strong>
        用 AI 识别并重构传统文化叙事中的性别偏见，让命理不再只是被动的预言。
      </li>
      <li>
        <strong>双重解读</strong>
        输入八字后，系统会并列呈现传统解读与重新解读两个版本，供你对比与思考。
      </li>
      <li>
        <strong>目标用户</strong>
        面向对自我探索与文化反思感兴趣的年轻女性。
      </li>
    </ul>
  </section>

  <footer>高中生研究项目</footer>
</body>
</html>
